##########           LIQUIBASE FLOWFILE - ROLLBACK SPECIFIC CHANGESET  ##########
##########  learn more http://docs.liquibase.com/flow                  ##########

## USAGE:
## export CHANGESET_ID=003
## export CHANGESET_AUTHOR=author
## export CHANGESET_PATH=changelog/v1.1/003-add-email-column.sql  
## liquibase flow --flow-file=liquibase.flowfile.rollback-one-change.yaml


## Note: Any command which fails in any stage below result in the command stopping, and endStage being run.
## A flow file can have one or more stages, each with multiple "actions", 
## or your flow file can have multiple stages with fewer actions in each stage.
stages:

  ## Rollback specific changeset stage
  Default:
        
    actions:
      #
      # Rollback specific changeset by ID and author
      #
      - type: liquibase
        command: rollback-one-changeset
        cmdArgs: 
          changeset-id: "${CHANGESET_ID}"
          changeset-author: "${CHANGESET_AUTHOR}"
          changeset-path: "${CHANGESET_PATH}"
          force: "true"

## The endStage ALWAYS RUNS. 
## So put actions here which you desire to perform whether previous stages' actions succeed or fail.
## If you do not want any actions to ALWAYS RUN, simply delete the endStage from your flow file.

endStage:
  actions:
    - type: liquibase
      command: history